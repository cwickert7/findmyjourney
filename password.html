<!DOCTYPE html>
<!-- FILE: password.html -->
<!-- Site-wide password gate — submits to server-side API to set httpOnly cookie -->
<html lang="en">
<head>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-QYPMPJGP10"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-QYPMPJGP10');

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Find My Journey — Private Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,200;9..144,300;9..144,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#FAF7F2;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{background:#fff;border:1px solid #E8DFD0;border-radius:20px;padding:48px 40px;width:100%;max-width:420px;box-shadow:0 4px 40px rgba(44,36,34,.07);text-align:center}
.brand{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:32px}
.brand-text{display:flex;flex-direction:column;align-items:flex-start;line-height:1}
.brand-top{font-size:9px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:rgba(196,113,74,.7);margin-bottom:2px}
.brand-name{font-family:'Fraunces',serif;font-size:20px;font-weight:300;color:#2C2422}
h1{font-family:'Fraunces',serif;font-size:26px;font-weight:300;color:#2C2422;margin-bottom:8px}
p{font-size:14px;color:#9A8E84;margin-bottom:28px;line-height:1.6}
input{width:100%;border:1px solid #E8DFD0;border-radius:10px;padding:13px 16px;font-size:15px;color:#2C2422;font-family:'DM Sans',sans-serif;background:#FAF7F2;outline:none;text-align:center;letter-spacing:.1em;margin-bottom:12px;transition:border-color .15s}
input:focus{border-color:#C4714A;background:#fff}
input::placeholder{letter-spacing:.05em;color:#C8BFB5}
button{width:100%;background:#C4714A;color:#fff;border:none;border-radius:50px;padding:14px;font-size:15px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;transition:background .15s}
button:hover{background:#A85C38}
button:disabled{background:rgba(196,113,74,.4);cursor:not-allowed}
.error{font-size:13px;color:#A32D2D;margin-top:10px;display:none}
.note{font-size:11px;color:#C8BFB5;margin-top:20px;line-height:1.6}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="card">
  <div class="brand">
    <svg width="28" height="28" viewBox="0 0 60 60" fill="none" style="animation:spin 14s linear infinite;flex-shrink:0">
      <circle cx="30" cy="30" r="26" stroke="rgba(196,113,74,.35)" stroke-width="2" fill="none"/>
      <path d="M30 30 L30 50" stroke="rgba(196,113,74,.3)" stroke-width="2" stroke-linecap="round" stroke-dasharray="2 4"/>
      <path d="M30 30 L30 10" stroke="rgba(196,113,74,.85)" stroke-width="4" stroke-linecap="round"/>
      <path d="M23 16 L30 8 L37 16" fill="#C4714A"/>
      <circle cx="30" cy="30" r="4.5" fill="#C4714A"/>
      <circle cx="30" cy="30" r="2" fill="#2C2422"/>
    </svg>
    <div class="brand-text">
      <span class="brand-top">find my</span>
      <span class="brand-name">Journey</span>
    </div>
  </div>
  <h1>Private preview</h1>
  <p>Find My Journey is currently in private preview.<br>Enter the access password to continue.</p>
  <input type="password" id="pwd" placeholder="Enter password" autocomplete="off">
  <button id="btn" onclick="checkPassword()">Continue →</button>
  <div class="error" id="err">Incorrect password — please try again.</div>
  <p class="note">Authorised testers only.<br>Questions? Contact hello@findmyjourney.com.au</p>
</div>
<script>
// ── SET PASSWORD HERE ──
// TEMPORARY — password protection disabled for Stripe verification
// Revert to original password.html after Stripe approves site
var VERSION = '2';
var COOKIE_NAME = 'fmj_access_v' + VERSION;
var expires = new Date(Date.now() + 7 * 24 * 60 * 60 * 1000).toUTCString();
document.cookie = COOKIE_NAME + '=granted;expires=' + expires + ';path=/;SameSite=Lax';
window.location.replace('/');
</script>
</body>
</html>
