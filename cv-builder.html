<!DOCTYPE html>
<!-- FILE: cv-builder.html -->
<!-- Find My Journey — Standalone CV Builder -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CV Builder — Find My Journey</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,200;9..144,300;9..144,400&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --tc:#C4714A;--tc-dark:#A85C38;--tc-light:#FEF3EC;
  --bg:#FAF7F2;--bg2:#F5F0E8;--bg3:#fff;
  --border:#E8DFD0;--border2:#D4C4B0;
  --text:#2C2422;--mid:#6B6058;--muted:#9A8E84;--faint:#C8BFB5;
  --success:#3D6B4F;--success-bg:#EDF7EE;
  --danger:#A32D2D;--danger-bg:#FCEBEB;
  --radius:12px;--radius-lg:20px;
  --font-body:'DM Sans',sans-serif;
  --font-display:'Fraunces',serif;
}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.6}
@keyframes spin{to{transform:rotate(360deg)}}

/* Nav */
.nav{background:var(--text);padding:0 32px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.nav-brand{display:flex;align-items:center;gap:10px;text-decoration:none}
.nav-brand-text{display:flex;flex-direction:column;line-height:1}
.nav-brand-top{font-size:8px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:rgba(196,113,74,.7);margin-bottom:1px}
.nav-brand-name{font-family:var(--font-display);font-size:16px;font-weight:300;color:#fff}
.nav-right{font-size:12px;color:var(--faint)}

/* Layout */
.app{display:grid;grid-template-columns:480px 1fr;min-height:calc(100vh - 56px)}
@media(max-width:900px){.app{grid-template-columns:1fr}}

/* Form panel */
.form-panel{background:var(--bg3);border-right:1px solid var(--border);overflow-y:auto;height:calc(100vh - 56px);position:sticky;top:56px}
.form-inner{padding:32px;max-width:480px}

/* Preview panel */
.preview-panel{background:var(--bg2);overflow-y:auto;height:calc(100vh - 56px);padding:32px;display:flex;flex-direction:column;align-items:center}
.preview-title{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:20px;text-align:center}
.preview-doc{background:#fff;width:100%;max-width:595px;min-height:500px;box-shadow:0 8px 40px rgba(44,36,34,.12);border-radius:4px;padding:48px 52px;font-family:var(--font-body);font-size:11px;line-height:1.6;color:#1a1a1a}
.preview-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:400px;color:var(--muted);text-align:center;gap:12px}
.preview-placeholder p{font-size:13px;max-width:200px;line-height:1.5}
@media(max-width:900px){.preview-panel{display:none}.app{grid-template-columns:1fr}.form-panel{height:auto;position:static}}

/* Progress */
.progress-wrap{margin-bottom:28px}
.progress-steps{display:flex;gap:4px;margin-bottom:8px}
.progress-step{height:3px;flex:1;border-radius:2px;background:var(--border);transition:background .3s}
.progress-step.done{background:var(--tc)}
.progress-step.active{background:var(--tc);opacity:.6}
.progress-label{font-size:11px;color:var(--muted)}

/* Section heading */
.section-head{margin-bottom:24px}
.section-tag{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--tc);margin-bottom:6px}
.section-title{font-family:var(--font-display);font-size:22px;font-weight:300;color:var(--text);line-height:1.2;margin-bottom:6px}
.section-hint{font-size:13px;color:var(--muted);line-height:1.5}

/* Fields */
.field{margin-bottom:16px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--mid);margin-bottom:5px}
.field .optional{font-weight:400;color:var(--muted);margin-left:4px}
.field input,.field textarea,.field select{width:100%;border:1.5px solid var(--border);border-radius:var(--radius);padding:10px 13px;font-size:13px;color:var(--text);font-family:var(--font-body);background:var(--bg);outline:none;transition:border-color .15s,background .15s;resize:vertical}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--tc);background:#fff}
.field textarea{min-height:80px}
.field .hint{font-size:11px;color:var(--muted);margin-top:4px;line-height:1.4}

/* Pills */
.pill-group{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
.pill{border:1.5px solid var(--border);border-radius:50px;padding:5px 12px;font-size:12px;cursor:pointer;color:var(--mid);background:var(--bg);transition:all .15s;user-select:none}
.pill:hover{border-color:var(--tc);color:var(--tc)}
.pill.selected{background:var(--tc);border-color:var(--tc);color:#fff}

/* Repeat blocks */
.repeat-block{border:1.5px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;background:var(--bg)}
.repeat-block-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.repeat-block-label{font-size:12px;font-weight:600;color:var(--mid)}
.remove-btn{font-size:11px;color:var(--muted);background:none;border:none;cursor:pointer;padding:2px 6px;border-radius:4px}
.remove-btn:hover{color:var(--danger)}
.add-btn{width:100%;border:1.5px dashed var(--border2);border-radius:var(--radius);padding:10px;font-size:12px;color:var(--muted);background:none;cursor:pointer;transition:all .15s;font-family:var(--font-body)}
.add-btn:hover{border-color:var(--tc);color:var(--tc);background:var(--tc-light)}

/* Profile box */
.profile-box{background:var(--tc-light);border:1.5px solid rgba(196,113,74,.2);border-radius:var(--radius);padding:14px;margin-bottom:16px}
.profile-box-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--tc);margin-bottom:6px}
.profile-box-text{font-size:13px;color:var(--text);line-height:1.6}
.profile-edit-btn{font-size:11px;color:var(--tc);background:none;border:none;cursor:pointer;padding:4px 0;font-family:var(--font-body);text-decoration:underline;margin-top:6px;display:block}

/* JD toggle */
.jd-toggle{display:flex;align-items:center;gap:10px;padding:12px 14px;border:1.5px solid var(--border);border-radius:var(--radius);cursor:pointer;margin-bottom:16px;background:var(--bg);transition:border-color .15s}
.jd-toggle:hover{border-color:var(--tc)}
.jd-toggle-icon{width:32px;height:32px;border-radius:50%;background:var(--tc-light);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px}
.jd-toggle-text{flex:1}
.jd-toggle-title{font-size:13px;font-weight:600;color:var(--text)}
.jd-toggle-sub{font-size:11px;color:var(--muted)}
.jd-toggle-arrow{color:var(--muted);font-size:18px;transition:transform .2s}
.jd-toggle.open .jd-toggle-arrow{transform:rotate(90deg)}
.jd-content{display:none;margin-bottom:16px}
.jd-content.open{display:block}

/* Buttons */
.btn-row{display:flex;gap:10px;margin-top:24px}
.btn-primary{background:var(--tc);color:#fff;border:none;border-radius:50px;padding:12px 28px;font-size:14px;font-weight:600;font-family:var(--font-body);cursor:pointer;transition:background .15s;flex:1}
.btn-primary:hover{background:var(--tc-dark)}
.btn-primary:disabled{opacity:.6;cursor:not-allowed}
.btn-sec{background:transparent;color:var(--mid);border:1.5px solid var(--border);border-radius:50px;padding:12px 20px;font-size:14px;font-weight:500;font-family:var(--font-body);cursor:pointer;transition:all .15s}
.btn-sec:hover{border-color:var(--tc);color:var(--tc)}

/* Path selector */
.path-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px}
.path-card{border:2px solid var(--border);border-radius:var(--radius);padding:16px;cursor:pointer;transition:all .2s;background:var(--bg)}
.path-card:hover{border-color:var(--tc);background:var(--tc-light)}
.path-card.selected{border-color:var(--tc);background:var(--tc-light)}
.path-card-icon{font-size:24px;margin-bottom:8px}
.path-card-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:3px}
.path-card-desc{font-size:11px;color:var(--muted);line-height:1.4}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:10px 20px;border-radius:50px;font-size:13px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}

/* Result screen */
.result-screen{padding:0}
.result-title{font-family:var(--font-display);font-size:26px;font-weight:300;color:var(--text);margin-bottom:6px}
.result-sub{font-size:13px;color:var(--muted);margin-bottom:24px;line-height:1.5}
.result-actions{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
.result-action{display:flex;align-items:center;gap:12px;padding:14px 16px;border:1.5px solid var(--border);border-radius:var(--radius);cursor:pointer;background:var(--bg);transition:all .15s;text-decoration:none}
.result-action:hover{border-color:var(--tc);background:var(--tc-light)}
.result-action-icon{width:36px;height:36px;border-radius:50%;background:var(--tc-light);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px}
.result-action-text{flex:1}
.result-action-title{font-size:13px;font-weight:600;color:var(--text)}
.result-action-sub{font-size:11px;color:var(--muted)}
.save-link-wrap{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--radius);padding:14px;margin-top:16px}
.save-link-label{font-size:11px;font-weight:600;color:var(--mid);margin-bottom:8px}
.save-link-row{display:flex;gap:8px}
.save-link-input{flex:1;border:1.5px solid var(--border);border-radius:8px;padding:8px 12px;font-size:12px;color:var(--text);background:#fff;font-family:var(--font-body);outline:none}
.save-link-copy-btn{background:var(--tc);color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font-body);white-space:nowrap}
.disclaimer{font-size:11px;color:var(--muted);line-height:1.5;padding:12px 14px;background:var(--bg2);border-radius:var(--radius);margin-top:16px}

/* Loading */
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;gap:16px;text-align:center}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--tc);border-radius:50%;animation:spin .8s linear infinite}
.loading-msg{font-size:14px;color:var(--muted)}

/* Error box */
.error-box{background:var(--danger-bg);border:1.5px solid #F09595;border-radius:var(--radius);padding:12px 14px;font-size:13px;color:var(--danger);margin-bottom:16px;display:none}

/* CV preview styles */
.cv-name{font-size:20px;font-weight:700;color:#1a1a1a;margin-bottom:2px}
.cv-contact-row{font-size:10px;color:#6B6058;border-bottom:2px solid #C4714A;padding-bottom:8px;margin-bottom:12px}
.cv-section-title{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#C4714A;border-bottom:1px solid #E8DFD0;padding-bottom:3px;margin:12px 0 7px}
.cv-profile{font-size:10px;color:#2C2422;line-height:1.6}
.cv-item{margin-bottom:9px}
.cv-item-head{display:flex;justify-content:space-between;align-items:baseline}
.cv-item-title{font-size:10px;font-weight:700;color:#1a1a1a}
.cv-item-date{font-size:9px;color:#9A8E84}
.cv-item-org{font-size:9px;color:#6B6058;margin-bottom:2px}
.cv-item-body{font-size:9px;color:#2C2422;line-height:1.5}
.cv-skills-wrap{display:flex;flex-wrap:wrap;gap:4px}
.cv-skill{background:#FAF7F2;border:1px solid #E8DFD0;border-radius:3px;padding:2px 6px;font-size:9px;color:#2C2422}
</style>
</head>
<body>

<nav class="nav">
  <a href="/" class="nav-brand">
    <svg width="22" height="22" viewBox="0 0 60 60" fill="none" style="animation:spin 14s linear infinite;flex-shrink:0"><circle cx="30" cy="30" r="26" stroke="rgba(196,113,74,.35)" stroke-width="2.5" fill="none"/><path d="M30 30 L30 50" stroke="rgba(196,113,74,.25)" stroke-width="2" stroke-linecap="round" stroke-dasharray="2 4"/><path d="M30 30 L30 10" stroke="rgba(196,113,74,.8)" stroke-width="4" stroke-linecap="round"/><path d="M23 16 L30 8 L37 16" fill="#C4714A"/><circle cx="30" cy="30" r="4" fill="#C4714A"/><circle cx="30" cy="30" r="1.8" fill="#1E1613"/></svg>
    <div class="nav-brand-text">
      <span class="nav-brand-top">find my</span>
      <span class="nav-brand-name">Journey</span>
    </div>
  </a>
  <span class="nav-right">CV Builder</span>
</nav>

<div class="app">
  <div class="form-panel">
    <div class="form-inner" id="formInner"></div>
  </div>
  <div class="preview-panel">
    <div class="preview-title">Live preview</div>
    <div class="preview-doc" id="previewDoc">
      <div class="preview-placeholder">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="opacity:.3"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        <p>Your CV preview will appear here as you fill in your details</p>
      </div>
    </div>
    <div style="margin-top:12px;font-size:11px;color:var(--muted);text-align:center">Updates as you type</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── State ──
var CV={};
var PATH=null;
var STEP=0;
var ASSESSMENT_DATA=null;
var CV_UUID=null;
var JD_OPEN=false;
var EXPERIENCE_BLOCKS=[];
var EDUCATION_BLOCKS=[];
var REFEREE_BLOCKS=[];
var IS_GENERATING=false;

var SOFT_SKILLS=['Communication','Teamwork','Problem solving','Adaptability','Leadership','Time management','Attention to detail','Customer service','Initiative','Critical thinking','Empathy','Creativity','Reliability','Work ethic','Conflict resolution'];
var SUBJECTS=['English','Mathematics','Science','Biology','Chemistry','Physics','History','Geography','Art','Music','Physical Education','Technology','Computing','Economics','Business','Health','Legal Studies','Psychology','Languages','Drama'];

// ── URL params ──
var urlParams=new URLSearchParams(window.location.search);
var fromAssessment=urlParams.get('from')==='assessment';
var assessmentUUID=urlParams.get('uuid');
var cvUUID=urlParams.get('cv');

window.addEventListener('DOMContentLoaded',function(){
  if(cvUUID){loadSavedCV(cvUUID);}
  else if(fromAssessment&&assessmentUUID){loadAssessmentData(assessmentUUID);}
  else{showPathSelector();}
});

// ── Load assessment data ──
async function loadAssessmentData(uuid){
  showLoading('Loading your assessment results\u2026');
  try{
    var r=await fetch('/api/get-result?uuid='+uuid);
    if(r.ok){
      var data=await r.json();
      if(data&&data.result){
        ASSESSMENT_DATA=data.result;
        CV.first_name=data.result.name||'';
        CV.email=data.result.email||'';
        CV.profile_draft=data.result.summary||'';
      }
    }
  }catch(e){}
  showPathSelector();
}

// ── Load saved CV ──
async function loadSavedCV(uuid){
  showLoading('Loading your saved CV\u2026');
  try{
    var r=await fetch('/api/cv-get?uuid='+uuid);
    if(r.ok){
      var data=await r.json();
      if(data&&data.cv){
        CV=data.cv;PATH=data.cv.path;
        EXPERIENCE_BLOCKS=data.cv.experience||[];
        EDUCATION_BLOCKS=data.cv.education||[];
        REFEREE_BLOCKS=data.cv.referees||[];
        CV_UUID=uuid;
        showStep(0);updatePreview();return;
      }
    }
    showToast('Could not load CV. Starting fresh.');showPathSelector();
  }catch(e){showPathSelector();}
}

function showLoading(msg){
  document.getElementById('formInner').innerHTML='<div class="loading-screen"><div class="spinner"></div><div class="loading-msg">'+(msg||'Loading\u2026')+'</div></div>';
}

// ── Path selector ──
function showPathSelector(){
  STEP=-1;
  var html='<div class="section-head"><div class="section-tag">Let\'s get started</div><div class="section-title">Where are you at right now?</div><div class="section-hint">This shapes the questions we ask and the CV we build for you.</div></div>';
  html+='<div class="path-grid">';
  [{v:'school',icon:'📚',title:'Still at school',desc:'Year 10, 11 or 12 \u2014 looking for part-time work or planning ahead'},
   {v:'leaver',icon:'🎓',title:'Recently finished school',desc:'Just finished Year 12 or left school \u2014 looking for your first role'},
   {v:'experience',icon:'💼',title:'Some experience',desc:'Had 1\u20132 jobs and building your career story'},
   {v:'graduate',icon:'🚀',title:'Graduate or career changer',desc:'Completed a degree or TAFE, or changing direction'}
  ].forEach(function(p){
    html+='<div class="path-card" id="path_'+p.v+'" onclick="selectPath(\''+p.v+'\')">';
    html+='<div class="path-card-icon">'+p.icon+'</div>';
    html+='<div class="path-card-title">'+p.title+'</div>';
    html+='<div class="path-card-desc">'+p.desc+'</div></div>';
  });
  html+='</div><div class="btn-row" style="margin-top:24px"><button class="btn-primary" id="pathNextBtn" onclick="startBuild()" disabled>Continue &rarr;</button></div>';
  document.getElementById('formInner').innerHTML=html;
}

function selectPath(v){
  PATH=v;CV.path=v;
  document.querySelectorAll('.path-card').forEach(function(c){c.classList.remove('selected');});
  document.getElementById('path_'+v).classList.add('selected');
  document.getElementById('pathNextBtn').disabled=false;
}

// ── Steps ──
function getSteps(){
  var s=[
    {id:'personal',label:'Personal details',tag:'About you'},
    {id:'education',label:'Education',tag:'Your background'},
    {id:'experience',label:'Experience',tag:'What you\'ve done'}
  ];
  if(PATH==='school'||PATH==='leaver'){
    s.push({id:'life',label:'Life & activities',tag:'Beyond the classroom'});
  }
  s.push({id:'skills',label:'Skills & strengths',tag:'What you bring'});
  s.push({id:'profile',label:'Professional profile',tag:'Your story'});
  if(PATH==='experience'||PATH==='graduate'){
    s.push({id:'extras',label:'Achievements & activities',tag:'Going further'});
  }
  s.push({id:'jd',label:'Tailor & generate',tag:'Final step'});
  return s;
}

function startBuild(){if(!PATH)return;STEP=0;showStep(0);}

// ── Show step ──
function showStep(i){
  var steps=getSteps();
  if(i<0){showPathSelector();return;}
  if(i>=steps.length){generateCV();return;}
  STEP=i;
  var step=steps[i];
  var html='';

  // Progress
  html+='<div class="progress-wrap"><div class="progress-steps">';
  steps.forEach(function(s,idx){
    var cls=idx<i?'done':idx===i?'active':'';
    html+='<div class="progress-step '+cls+'"></div>';
  });
  html+='</div><div class="progress-label">Step '+(i+1)+' of '+steps.length+' \u2014 '+step.label+'</div></div>';

  // Heading
  html+='<div class="section-head"><div class="section-tag">'+step.tag+'</div><div class="section-title">'+step.label+'</div></div>';
  html+='<div id="errBox" class="error-box"></div>';
  html+=buildStepContent(step.id);

  // Buttons
  html+='<div class="btn-row">';
  if(i>0)html+='<button class="btn-sec" onclick="showStep('+(i-1)+')">Back</button>';
  var isLast=(i===steps.length-1);
  html+='<button class="btn-primary" onclick="'+(isLast?'generateCV()':'nextStep('+i+')')+'">'+(isLast?'&#x2728; Build my CV':'Continue &rarr;')+'</button>';
  html+='</div>';

  document.getElementById('formInner').innerHTML=html;
  restoreStepValues(step.id);
  updatePreview();
  document.getElementById('formInner').scrollTop=0;
}

// ── Build step content ──
function buildStepContent(id){
  var html='';
  if(id==='personal'){
    html+=fld('first_name','First name','e.g. Jordan','text');
    html+=fld('last_name','Last name','e.g. Smith','text');
    html+='<div class="field-row">'+fld('email','Email address','e.g. jordan@email.com','email')+fld('phone','Phone','e.g. 0412 345 678','text')+'</div>';
    html+='<div class="field-row">'+fld('suburb','Suburb','e.g. Frankston','text')+fld('state','State','e.g. VIC','text')+'</div>';
    if(PATH==='experience'||PATH==='graduate'){html+=fld('linkedin','LinkedIn URL <span class="optional">(optional)</span>','e.g. linkedin.com/in/jordansmith','text');}
  }
  else if(id==='education'){
    if(PATH==='school'){
      html+=fld('school_name','School name','e.g. Frankston High School','text');
      html+='<div class="field-row"><div class="field"><label for="f_school_year">Current year level</label><select id="f_school_year" onchange="CV.school_year='Year '+this.value;updatePreview()"><option value="">Select year level</option><option value="7">Year 7</option><option value="8">Year 8</option><option value="9">Year 9</option><option value="10">Year 10</option><option value="11">Year 11</option><option value="12">Year 12</option></select></div>'+fld('school_grad','Expected graduation year','e.g. 2026','text')+'</div>';
      html+='<div class="field"><label>Subjects <span class="optional">(select all that apply)</span></label><div class="pill-group" id="subjectPills">';
      SUBJECTS.forEach(function(s){html+='<div class="pill" onclick="togglePill(this,\'subjects\',\''+s+'\')">'+s+'</div>';});

// ── Field helper ──
function fld(id,label,placeholder,type){
  var html='<div class="field"><label for="f_'+id+'">'+label+'</label>';
  if(type==='textarea'){html+='<textarea id="f_'+id+'" placeholder="'+placeholder+'" oninput="CV[\''+id+'\']=this.value;updatePreview()"></textarea>';}
  else{html+='<input type="'+(type||'text')+'" id="f_'+id+'" placeholder="'+placeholder+'" oninput="CV[\''+id+'\']=this.value;updatePreview()">';}
  html+='</div>';return html;
}

function restoreStepValues(stepId){
  Object.keys(CV).forEach(function(k){var el=document.getElementById('f_'+k);if(el)el.value=CV[k]||'';});
  if(CV.soft_skills){CV.soft_skills.forEach(function(s){document.querySelectorAll('#softSkillPills .pill').forEach(function(p){if(p.textContent===s)p.classList.add('selected');});});}
  if(CV.subjects){CV.subjects.forEach(function(s){document.querySelectorAll('#subjectPills .pill').forEach(function(p){if(p.textContent===s)p.classList.add('selected');});});}
  if(stepId==='experience')renderExperienceBlocks();
  if(stepId==='education'&&(PATH==='experience'||PATH==='graduate'))renderEducationBlocks();
  if(stepId==='extras')renderRefereeBlocks();
}

// ── Pill toggle ──
function togglePill(el,key,val){
  if(!CV[key])CV[key]=[];
  var max=key==='soft_skills'?6:999;
  if(el.classList.contains('selected')){el.classList.remove('selected');CV[key]=CV[key].filter(function(v){return v!==val;});}
  else{if(CV[key].length>=max){showToast('Maximum '+max+' selections');return;}el.classList.add('selected');CV[key].push(val);}
  updatePreview();
}

  var wrap=document.getElementById('profileEditWrap');

// ── Validation ──
function nextStep(i){
  var steps=getSteps();var step=steps[i];
  var err=validateStep(step.id);
  if(err){var eb=document.getElementById('errBox');if(eb){eb.textContent=err;eb.style.display='block';}return;}
  showStep(i+1);
}

function validateStep(id){
  if(id==='personal'){
    if(!CV.first_name)return'Please enter your first name.';
    if(!CV.last_name)return'Please enter your last name.';
    if(!CV.email)return'Please enter your email address.';
    if(!CV.phone)return'Please enter your phone number.';
    if(!CV.suburb)return'Please enter your suburb.';
    if(!CV.state)return'Please enter your state.';
  }
  if(id==='education'&&PATH==='school'){if(!CV.school_name)return'Please enter your school name.';}
  return null;
}

// ── Generate CV ──
async function generateCV(){
  if(IS_GENERATING)return;IS_GENERATING=true;
  var jdEl=document.getElementById('f_jd');if(jdEl)CV.jd=jdEl.value;
  var certsEl=document.getElementById('f_certs');if(certsEl)CV.certs=certsEl.value;
  CV.experience=EXPERIENCE_BLOCKS;CV.education=EDUCATION_BLOCKS;CV.referees=REFEREE_BLOCKS;
  var hasJD=CV.jd&&CV.jd.trim().length>20;
  showLoading(hasJD?'Building your CV and cover letter\u2026':'Building your CV\u2026');
  try{
    var r=await fetch('/api/cv-generate',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({cv:CV,path:PATH,assessment:ASSESSMENT_DATA,hasJD:hasJD})
    });
    var data=await r.json();
    if(!r.ok||data.error){
      IS_GENERATING=false;showStep(getSteps().length-1);
      var eb=document.getElementById('errBox');if(eb){eb.textContent=data.error||'Something went wrong. Please try again.';eb.style.display='block';}
      return;
    }
    CV_UUID=data.uuid;IS_GENERATING=false;showResultScreen(data);
  }catch(e){IS_GENERATING=false;showStep(getSteps().length-1);var eb=document.getElementById('errBox');if(eb){eb.textContent='Something went wrong building your CV. Please check your details and try again.';eb.style.display='block';}}
}

// ── Result screen ──

  var hasJD=CV.jd&&CV.jd.trim().length>20;
  var html='<div class="section-tag">&#x2728; All done</div>';
  html+='<div class="result-title">Your CV is ready'+(CV.first_name?', '+CV.first_name:'')+'.</div>';

  html+='<a class="result-action" href="/api/cv-download?uuid='+CV_UUID+'&format=pdf" target="_blank"><div class="result-action-icon">&#x1F4C4;</div><div class="result-action-text"><div class="result-action-title">Download as PDF</div><div class="result-action-sub">Best for emailing and applying online</div></div></a>';
  html+='<a class="result-action" href="/api/cv-download?uuid='+CV_UUID+'&format=docx" target="_blank"><div class="result-action-icon">&#x1F4DD;</div><div class="result-action-text"><div class="result-action-title">Download as Word</div><div class="result-action-sub">Editable in Microsoft Word or Google Docs</div></div></a>';
  if(hasJD){html+='<a class="result-action" href="/api/cv-download?uuid='+CV_UUID+'&format=cover" target="_blank"><div class="result-action-icon">&#x2709;&#xFE0F;</div><div class="result-action-text"><div class="result-action-title">Download cover letter</div><div class="result-action-sub">Tailored to the job you applied for</div></div></a>';}
  html+='<div class="result-action" onclick="editCV()" style="cursor:pointer"><div class="result-action-icon">&#x270F;&#xFE0F;</div><div class="result-action-text"><div class="result-action-title">Edit my CV</div><div class="result-action-sub">Go back and make changes</div></div></div>';
  html+='</div>';
  var saveLink=window.location.origin+'/cv-builder.html?cv='+CV_UUID;
  html+='<div class="save-link-wrap"><div class="save-link-label">Your personal CV link \u2014 bookmark this to come back and edit</div>';
  html+='<div class="save-link-row"><input class="save-link-input" id="cvSaveLink" value="'+saveLink+'" readonly><button class="save-link-copy-btn" id="cvCopyBtn" onclick="copyCVLink()">Copy link</button></div></div>';

  document.getElementById('formInner').innerHTML=html;
  if(data.cv_html)document.getElementById('previewDoc').innerHTML=data.cv_html;

function editCV(){STEP=0;showStep(0);}

function copyCVLink(){
  var input=document.getElementById('cvSaveLink');
  if(input){navigator.clipboard.writeText(input.value).then(function(){var btn=document.getElementById('cvCopyBtn');if(btn){btn.textContent='Copied!';setTimeout(function(){btn.textContent='Copy link';},2000);}});}
}

// ── Live preview ──
function updatePreview(){
  var doc=document.getElementById('previewDoc');if(!doc)return;
  var name=(CV.first_name||'')+(CV.last_name?' '+CV.last_name:'');
  if(!name.trim())return;
  var html='';
  html+='<div class="cv-name">'+esc(name)+'</div>';
  var contact=[];
  if(CV.phone)contact.push(esc(CV.phone));
  if(CV.email)contact.push(esc(CV.email));
  if(CV.suburb&&CV.state)contact.push(esc(CV.suburb+', '+CV.state));
  if(CV.linkedin)contact.push(esc(CV.linkedin));
  html+='<div class="cv-contact-row">'+contact.join(' &nbsp;|&nbsp; ')+'</div>';
  var profile=CV.profile||CV.profile_draft||(ASSESSMENT_DATA&&ASSESSMENT_DATA.summary);
  if(profile){html+='<div class="cv-section-title">Professional Profile</div><div class="cv-profile">'+esc(profile)+'</div>';}
  var hasEdu=CV.school_name||(EDUCATION_BLOCKS&&EDUCATION_BLOCKS.length>0);
  if(hasEdu){
    html+='<div class="cv-section-title">Education</div>';
    if(CV.school_name){html+='<div class="cv-item"><div class="cv-item-head"><span class="cv-item-title">'+esc(CV.school_name)+'</span><span class="cv-item-date">'+esc(CV.school_year||'')+'</span></div></div>';}
    EDUCATION_BLOCKS.forEach(function(b){if(!b.institution)return;html+='<div class="cv-item"><div class="cv-item-head"><span class="cv-item-title">'+esc(b.qualification||'')+'</span><span class="cv-item-date">'+esc(b.year||'')+'</span></div><div class="cv-item-org">'+esc(b.institution)+(b.major?' \u2014 '+esc(b.major):'')+'</div></div>';});
  }
  if(EXPERIENCE_BLOCKS&&EXPERIENCE_BLOCKS.length>0){
    html+='<div class="cv-section-title">Experience</div>';
    EXPERIENCE_BLOCKS.forEach(function(b){
      if(!b.employer&&!b.role)return;
      html+='<div class="cv-item"><div class="cv-item-head"><span class="cv-item-title">'+esc(b.role||'')+'</span><span class="cv-item-date">'+esc((b.start||'')+(b.end?' \u2013 '+b.end:''))+'</span></div><div class="cv-item-org">'+esc(b.employer||'')+'</div>';
      if(b.duties)html+='<div class="cv-item-body">'+esc(b.duties)+'</div>';
      html+='</div>';
    });
  }
  var allSkills=(CV.soft_skills||[]).concat((CV.hard_skills||'').split(',').map(function(s){return s.trim();}).filter(Boolean));
  if(allSkills.length>0){
    html+='<div class="cv-section-title">Skills</div><div class="cv-skills-wrap">';
    allSkills.slice(0,12).forEach(function(s){html+='<span class="cv-skill">'+esc(s)+'</span>';});
    html+='</div>';
  }
  doc.innerHTML=html;
}

function esc(str){if(!str)return'';return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ── Month/year picker ──
var MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function monthYearPicker(id,currentVal,stateExpr,onchange,allowCurrent){
  var curMonth='';var curYear='';
  if(currentVal&&currentVal!=='Current'){var parts=currentVal.split(' ');if(parts.length===2){curMonth=parts[0];curYear=parts[1];}}
  var isCurrent=currentVal==='Current';
  var html='<div style="display:flex;gap:6px;align-items:center">';
  if(allowCurrent&&isCurrent){
    html+='<select style="flex:1;border:1.5px solid var(--border);border-radius:var(--radius);padding:9px 10px;font-size:12px;color:var(--text);font-family:var(--font-body);background:var(--bg);outline:none" disabled><option>Current</option></select>';
    html+='<select style="flex:1;border:1.5px solid var(--border);border-radius:var(--radius);padding:9px 10px;font-size:12px;color:var(--text);font-family:var(--font-body);background:var(--bg);outline:none" disabled><option>Current</option></select>';
    html+='<label style="display:flex;align-items:center;gap:4px;font-size:11px;color:var(--muted);white-space:nowrap;cursor:pointer"><input type="checkbox" checked onchange="handleCurrentToggle(this,''+id+'',''+stateExpr+'',''+onchange+'')"> Current</label>';
  } else {
    html+='<select id="'+id+'_m" style="flex:1;border:1.5px solid var(--border);border-radius:var(--radius);padding:9px 10px;font-size:12px;color:var(--text);font-family:var(--font-body);background:var(--bg);outline:none" onchange="updateMonthYear(''+id+'',''+stateExpr+'',''+onchange+'')">';
    html+='<option value="">Month</option>';
    MONTHS.forEach(function(m){html+='<option value="'+m+'"'+(m===curMonth?' selected':'')+'>'+m+'</option>';});
    html+='</select>';
    html+='<select id="'+id+'_y" style="flex:1;border:1.5px solid var(--border);border-radius:var(--radius);padding:9px 10px;font-size:12px;color:var(--text);font-family:var(--font-body);background:var(--bg);outline:none" onchange="updateMonthYear(''+id+'',''+stateExpr+'',''+onchange+'')">';
    html+='<option value="">Year</option>';
    var yr=new Date().getFullYear();for(var y=yr;y>=yr-10;y--){html+='<option value="'+y+'"'+(String(y)===curYear?' selected':'')+'>'+y+'</option>';}
    html+='</select>';
    if(allowCurrent){html+='<label style="display:flex;align-items:center;gap:4px;font-size:11px;color:var(--muted);white-space:nowrap;cursor:pointer"><input type="checkbox" id="'+id+'_cur" onchange="handleCurrentToggle(this,''+id+'',''+stateExpr+'',''+onchange+'')"> Current</label>';}
  }
  html+='</div>';
  return html;
}
function updateMonthYear(id,stateExpr,onchange){
  var m=document.getElementById(id+'_m');var y=document.getElementById(id+'_y');
  if(!m||!y)return;
  var val=(m.value&&y.value)?(m.value+' '+y.value):'';
  try{eval(stateExpr+'=''+val+''');}catch(e){}
  if(onchange)try{eval(onchange);}catch(e){}
}
function handleCurrentToggle(cb,id,stateExpr,onchange){
  if(cb.checked){
    try{eval(stateExpr+'='Current'');}catch(e){}
    if(onchange)try{eval(onchange);}catch(e){}
    // Re-render to show disabled state
    sortExperience();updatePreview();
  } else {
    try{eval(stateExpr+'=''');}catch(e){}
    if(onchange)try{eval(onchange);}catch(e){}
    sortExperience();updatePreview();
  }
}

// ── Sort experience chronologically (most recent first) ──
function sortExperience(){
  EXPERIENCE_BLOCKS.sort(function(a,b){
    var aEnd=a.end==='Current'?'9999-99':dateToSort(a.end);
    var bEnd=b.end==='Current'?'9999-99':dateToSort(b.end);
    return bEnd.localeCompare(aEnd);
  });
  CV.experience=EXPERIENCE_BLOCKS;
  renderExperienceBlocks();
}
function dateToSort(d){
  if(!d)return'0000-00';
  var parts=d.split(' ');if(parts.length!==2)return'0000-00';
  var mi=MONTHS.indexOf(parts[0]);
  return parts[1]+'-'+(mi>=0?String(mi+1).padStart(2,'0'):'00');
}

// ── Sport blocks ──
var SPORT_BLOCKS=[];
function addSport(){SPORT_BLOCKS.push({name:'',role:'',start:'',end:''});renderSportBlocks();}
function removeSport(i){SPORT_BLOCKS.splice(i,1);CV.sport_blocks=SPORT_BLOCKS;renderSportBlocks();}
function renderSportBlocks(){
  var wrap=document.getElementById('sportBlocks');if(!wrap)return;
  var html='';
  SPORT_BLOCKS.forEach(function(b,i){
    html+='<div class="repeat-block"><div class="repeat-block-head"><span class="repeat-block-label">Activity '+(i+1)+'</span><button class="remove-btn" onclick="removeSport('+i+')">Remove</button></div>';
    html+='<div class="field-row"><div class="field"><label>Sport or activity</label><input type="text" placeholder="e.g. Soccer" value="'+(b.name||'')+'" oninput="SPORT_BLOCKS['+i+'].name=this.value;CV.sport_blocks=SPORT_BLOCKS"></div>';
    html+='<div class="field"><label>Your role</label><input type="text" placeholder="e.g. Captain, Player" value="'+(b.role||'')+'" oninput="SPORT_BLOCKS['+i+'].role=this.value;CV.sport_blocks=SPORT_BLOCKS"></div></div>';
    html+='<div class="field-row"><div class="field"><label>From year</label><input type="text" placeholder="e.g. 2022" value="'+(b.start||'')+'" oninput="SPORT_BLOCKS['+i+'].start=this.value;CV.sport_blocks=SPORT_BLOCKS"></div>';
    html+='<div class="field"><label>To year</label><input type="text" placeholder="e.g. 2024 or Current" value="'+(b.end||'')+'" oninput="SPORT_BLOCKS['+i+'].end=this.value;CV.sport_blocks=SPORT_BLOCKS"></div></div>';
    html+='</div>';
  });
  wrap.innerHTML=html;
}

// ── Volunteer blocks ──
var VOLUNTEER_BLOCKS=[];
function addVolunteer(){VOLUNTEER_BLOCKS.push({org:'',role:'',period:''});renderVolunteerBlocks();}
function removeVolunteer(i){VOLUNTEER_BLOCKS.splice(i,1);CV.volunteer_blocks=VOLUNTEER_BLOCKS;renderVolunteerBlocks();}
function renderVolunteerBlocks(){
  var wrap=document.getElementById('volunteerBlocks');if(!wrap)return;
  var html='';
  VOLUNTEER_BLOCKS.forEach(function(b,i){
    html+='<div class="repeat-block"><div class="repeat-block-head"><span class="repeat-block-label">Role '+(i+1)+'</span><button class="remove-btn" onclick="removeVolunteer('+i+')">Remove</button></div>';
    html+='<div class="field-row"><div class="field"><label>Organisation</label><input type="text" placeholder="e.g. Local food bank" value="'+(b.org||'')+'" oninput="VOLUNTEER_BLOCKS['+i+'].org=this.value;CV.volunteer_blocks=VOLUNTEER_BLOCKS"></div>';
    html+='<div class="field"><label>Your role</label><input type="text" placeholder="e.g. Kitchen hand" value="'+(b.role||'')+'" oninput="VOLUNTEER_BLOCKS['+i+'].role=this.value;CV.volunteer_blocks=VOLUNTEER_BLOCKS"></div></div>';
    html+='<div class="field"><label>Period <span class="optional">(optional)</span></label><input type="text" placeholder="e.g. 2023–2024 or ongoing" value="'+(b.period||'')+'" oninput="VOLUNTEER_BLOCKS['+i+'].period=this.value;CV.volunteer_blocks=VOLUNTEER_BLOCKS"></div>';
    html+='</div>';
  });
  wrap.innerHTML=html;
}

// ── Language blocks ──
var LANGUAGE_BLOCKS=[];
function addLanguage(){LANGUAGE_BLOCKS.push({language:'',proficiency:''});renderLanguageBlocks();}
function removeLanguage(i){LANGUAGE_BLOCKS.splice(i,1);CV.language_blocks=LANGUAGE_BLOCKS;renderLanguageBlocks();}
function renderLanguageBlocks(){
  var wrap=document.getElementById('languageBlocks');if(!wrap)return;
  var html='';
  LANGUAGE_BLOCKS.forEach(function(b,i){
    html+='<div class="repeat-block"><div class="repeat-block-head"><span class="repeat-block-label">Language '+(i+1)+'</span><button class="remove-btn" onclick="removeLanguage('+i+')">Remove</button></div>';
    html+='<div class="field-row"><div class="field"><label>Language</label><input type="text" placeholder="e.g. Mandarin" value="'+(b.language||'')+'" oninput="LANGUAGE_BLOCKS['+i+'].language=this.value;CV.language_blocks=LANGUAGE_BLOCKS"></div>';
    html+='<div class="field"><label>Proficiency</label><select oninput="LANGUAGE_BLOCKS['+i+'].proficiency=this.value;CV.language_blocks=LANGUAGE_BLOCKS" style="width:100%;border:1.5px solid var(--border);border-radius:var(--radius);padding:10px 13px;font-size:13px;color:var(--text);font-family:var(--font-body);background:var(--bg);outline:none"><option value="">Select…</option><option'+(b.proficiency==='Bilingual'?' selected':'')+' value="Bilingual">Bilingual</option><option'+(b.proficiency==='Fluent'?' selected':'')+' value="Fluent">Fluent</option><option'+(b.proficiency==='Conversational'?' selected':'')+' value="Conversational">Conversational</option><option'+(b.proficiency==='Basic'?' selected':'')+' value="Basic">Basic</option></select></div></div>';
    html+='</div>';
  });
  wrap.innerHTML=html;
}

// ── Custom subject ──
function addCustomSubject(){
  var input=document.getElementById('customSubjectInput');
  if(!input||!input.value.trim())return;
  var val=input.value.trim();
  if(!CV.subjects)CV.subjects=[];
  if(CV.subjects.indexOf(val)>-1){showToast('Already added');return;}
  CV.subjects.push(val);
  // Add pill to group
  var group=document.getElementById('subjectPills');
  if(group){
    var pill=document.createElement('div');
    pill.className='pill selected';
    pill.textContent=val;
    pill.onclick=function(){togglePill(pill,'subjects',val);};
    group.appendChild(pill);
  }
  input.value='';
}

// ── Restore life blocks on step restore ──
var _origRestoreStepValues=restoreStepValues;
function restoreStepValues(stepId){
  _origRestoreStepValues(stepId);
  if(stepId==='life'){
    if(CV.sport_blocks){SPORT_BLOCKS=CV.sport_blocks;renderSportBlocks();}
    if(CV.volunteer_blocks){VOLUNTEER_BLOCKS=CV.volunteer_blocks;renderVolunteerBlocks();}
  }
  if(stepId==='skills'){
    if(CV.language_blocks){LANGUAGE_BLOCKS=CV.language_blocks;renderLanguageBlocks();}
  }
}

function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2500);}
</script>
