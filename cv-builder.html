<!DOCTYPE html>
<!-- FILE: cv-builder.html -->
<!-- Find My Journey — Standalone CV Builder -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CV Builder — Find My Journey</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,200;9..144,300;9..144,400&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --tc:#C4714A;--tc-dark:#A85C38;--tc-light:#FEF3EC;
  --bg:#FAF7F2;--bg2:#F5F0E8;--bg3:#fff;
  --border:#E8DFD0;--border2:#D4C4B0;
  --text:#2C2422;--mid:#6B6058;--muted:#9A8E84;--faint:#C8BFB5;
  --danger:#A32D2D;--danger-bg:#FCEBEB;
  --radius:12px;
  --font-body:'DM Sans',sans-serif;
  --font-display:'Fraunces',serif;
}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.6}
@keyframes spin{to{transform:rotate(360deg)}}
.nav{background:var(--text);padding:0 32px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.nav-brand{display:flex;align-items:center;gap:10px;text-decoration:none}
.nav-brand-text{display:flex;flex-direction:column;line-height:1}
.nav-brand-top{font-size:8px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:rgba(196,113,74,.7);margin-bottom:1px}
.nav-brand-name{font-family:var(--font-display);font-size:16px;font-weight:300;color:#fff}
.nav-right{font-size:12px;color:var(--faint)}
.app{display:grid;grid-template-columns:480px 1fr;min-height:calc(100vh - 56px)}
@media(max-width:900px){.app{grid-template-columns:1fr}}
.form-panel{background:var(--bg3);border-right:1px solid var(--border);overflow-y:auto;height:calc(100vh - 56px);position:sticky;top:56px}
.form-inner{padding:32px;max-width:480px}
.preview-panel{background:var(--bg2);overflow-y:auto;height:calc(100vh - 56px);padding:32px;display:flex;flex-direction:column;align-items:center}
.preview-title{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:20px;text-align:center}
.preview-doc{background:#fff;width:100%;max-width:595px;min-height:500px;box-shadow:0 8px 40px rgba(44,36,34,.12);border-radius:4px;padding:48px 52px;font-size:11px;line-height:1.6;color:#1a1a1a}
.preview-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:400px;color:var(--muted);text-align:center;gap:12px}
.preview-placeholder p{font-size:13px;max-width:200px;line-height:1.5}
@media(max-width:900px){.preview-panel{display:none}.app{grid-template-columns:1fr}.form-panel{height:auto;position:static}}
.progress-wrap{margin-bottom:28px}
.progress-steps{display:flex;gap:4px;margin-bottom:8px}
.progress-step{height:3px;flex:1;border-radius:2px;background:var(--border);transition:background .3s}
.progress-step.done{background:var(--tc)}
.progress-step.active{background:var(--tc);opacity:.6}
.progress-label{font-size:11px;color:var(--muted)}
.section-head{margin-bottom:24px}
.section-tag{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--tc);margin-bottom:6px}
.section-title{font-family:var(--font-display);font-size:22px;font-weight:300;color:var(--text);line-height:1.2;margin-bottom:6px}
.section-hint{font-size:13px;color:var(--muted);line-height:1.5}
.field{margin-bottom:16px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--mid);margin-bottom:5px}
.field input,.field textarea,.field select{width:100%;border:1.5px solid var(--border);border-radius:var(--radius);padding:10px 13px;font-size:13px;color:var(--text);font-family:var(--font-body);background:var(--bg);outline:none;transition:border-color .15s,background .15s;resize:vertical}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--tc);background:#fff}
.field textarea{min-height:80px}
.field .hint{font-size:11px;color:var(--muted);margin-top:4px;line-height:1.4}
.pill-group{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
.pill{border:1.5px solid var(--border);border-radius:50px;padding:5px 12px;font-size:12px;cursor:pointer;color:var(--mid);background:var(--bg);transition:all .15s;user-select:none}
.pill:hover{border-color:var(--tc);color:var(--tc)}
.pill.selected{background:var(--tc);border-color:var(--tc);color:#fff}
.repeat-block{border:1.5px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;background:var(--bg)}
.repeat-block-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.repeat-block-label{font-size:12px;font-weight:600;color:var(--mid)}
.remove-btn{font-size:11px;color:var(--muted);background:none;border:none;cursor:pointer;padding:2px 6px;border-radius:4px}
.remove-btn:hover{color:var(--danger)}
.add-btn{width:100%;border:1.5px dashed var(--border2);border-radius:var(--radius);padding:10px;font-size:12px;color:var(--muted);background:none;cursor:pointer;transition:all .15s;font-family:var(--font-body)}
.add-btn:hover{border-color:var(--tc);color:var(--tc);background:var(--tc-light)}
.profile-box{background:var(--tc-light);border:1.5px solid rgba(196,113,74,.2);border-radius:var(--radius);padding:14px;margin-bottom:16px}
.profile-box-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--tc);margin-bottom:6px}
.profile-box-text{font-size:13px;color:var(--text);line-height:1.6}
.profile-edit-btn{font-size:11px;color:var(--tc);background:none;border:none;cursor:pointer;padding:4px 0;font-family:var(--font-body);text-decoration:underline;margin-top:6px;display:block}
.jd-toggle{display:flex;align-items:center;gap:10px;padding:12px 14px;border:1.5px solid var(--border);border-radius:var(--radius);cursor:pointer;margin-bottom:12px;background:var(--bg)}
.jd-toggle:hover{border-color:var(--tc)}
.jd-toggle-icon{width:32px;height:32px;border-radius:50%;background:var(--tc-light);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px}
.jd-toggle-text{flex:1}
.jd-toggle-title{font-size:13px;font-weight:600;color:var(--text)}
.jd-toggle-sub{font-size:11px;color:var(--muted)}
.jd-toggle-arrow{color:var(--muted);font-size:18px;transition:transform .2s}
.jd-toggle.open .jd-toggle-arrow{transform:rotate(90deg)}
.jd-content{display:none;margin-bottom:12px}
.jd-content.open{display:block}
.btn-row{display:flex;gap:10px;margin-top:24px}
.btn-primary{background:var(--tc);color:#fff;border:none;border-radius:50px;padding:12px 28px;font-size:14px;font-weight:600;font-family:var(--font-body);cursor:pointer;transition:background .15s;flex:1}
.btn-primary:hover{background:var(--tc-dark)}
.btn-primary:disabled{opacity:.6;cursor:not-allowed}
.btn-sec{background:transparent;color:var(--mid);border:1.5px solid var(--border);border-radius:50px;padding:12px 20px;font-size:14px;font-family:var(--font-body);cursor:pointer;transition:all .15s}
.btn-sec:hover{border-color:var(--tc);color:var(--tc)}
.path-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px}
.path-card{border:2px solid var(--border);border-radius:var(--radius);padding:16px;cursor:pointer;transition:all .2s;background:var(--bg)}
.path-card:hover,.path-card.selected{border-color:var(--tc);background:var(--tc-light)}
.path-card-icon{font-size:24px;margin-bottom:8px}
.path-card-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:3px}
.path-card-desc{font-size:11px;color:var(--muted);line-height:1.4}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:10px 20px;border-radius:50px;font-size:13px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.result-action{display:flex;align-items:center;gap:12px;padding:14px 16px;border:1.5px solid var(--border);border-radius:var(--radius);cursor:pointer;background:var(--bg);transition:all .15s;text-decoration:none;margin-bottom:10px}
.result-action:hover{border-color:var(--tc);background:var(--tc-light)}
.result-action-icon{width:36px;height:36px;border-radius:50%;background:var(--tc-light);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px}
.result-action-text{flex:1}
.result-action-title{font-size:13px;font-weight:600;color:var(--text)}
.result-action-sub{font-size:11px;color:var(--muted)}
.save-link-wrap{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--radius);padding:14px;margin-top:16px}
.save-link-label{font-size:11px;font-weight:600;color:var(--mid);margin-bottom:8px}
.save-link-row{display:flex;gap:8px}
.save-link-input{flex:1;border:1.5px solid var(--border);border-radius:8px;padding:8px 12px;font-size:12px;color:var(--text);background:#fff;font-family:var(--font-body);outline:none}
.save-link-btn{background:var(--tc);color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font-body)}
.disclaimer{font-size:11px;color:var(--muted);line-height:1.5;padding:12px 14px;background:var(--bg2);border-radius:var(--radius);margin-top:16px}
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;gap:16px;text-align:center}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--tc);border-radius:50%;animation:spin .8s linear infinite}
.loading-msg{font-size:14px;color:var(--muted)}
.error-box{background:var(--danger-bg);border:1.5px solid #F09595;border-radius:var(--radius);padding:12px 14px;font-size:13px;color:var(--danger);margin-bottom:16px;display:none}
.date-picker-row{display:flex;gap:5px;align-items:center;flex-wrap:nowrap;width:100%}
.date-picker-row select{flex:1;min-width:0;border:1.5px solid var(--border);border-radius:var(--radius);padding:8px 6px;font-size:12px;color:var(--text);font-family:var(--font-body);background:var(--bg);outline:none;overflow:hidden;text-overflow:ellipsis}
.date-picker-row select:focus{border-color:var(--tc)}
.date-picker-row .cur-label{display:flex;align-items:center;gap:3px;font-size:11px;color:var(--muted);white-space:nowrap;cursor:pointer;flex-shrink:0}
.custom-subject-row{display:flex;gap:8px;margin-top:8px}
.custom-subject-row input{flex:1;border:1.5px solid var(--border);border-radius:8px;padding:7px 12px;font-size:12px;font-family:var(--font-body);background:var(--bg);outline:none}
.custom-subject-row input:focus{border-color:var(--tc)}
.custom-subject-btn{background:var(--tc);color:#fff;border:none;border-radius:8px;padding:7px 14px;font-size:12px;cursor:pointer;font-family:var(--font-body)}
/* CV preview */
.cv-name{font-size:20px;font-weight:700;color:#1a1a1a;margin-bottom:2px}
.cv-contact-row{font-size:10px;color:#6B6058;border-bottom:2px solid #C4714A;padding-bottom:8px;margin-bottom:12px}
.cv-section-title{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#C4714A;border-bottom:1px solid #E8DFD0;padding-bottom:3px;margin:12px 0 7px}
.cv-profile{font-size:10px;color:#2C2422;line-height:1.6}
.cv-item{margin-bottom:9px}
.cv-item-head{display:flex;justify-content:space-between;align-items:baseline}
.cv-item-title{font-size:10px;font-weight:700;color:#1a1a1a}
.cv-item-date{font-size:9px;color:#9A8E84}
.cv-item-org{font-size:9px;color:#6B6058;margin-bottom:2px}
.cv-item-body{font-size:9px;color:#2C2422;line-height:1.5}
.cv-skills-wrap{display:flex;flex-wrap:wrap;gap:4px}
.cv-skill{background:#FAF7F2;border:1px solid #E8DFD0;border-radius:3px;padding:2px 6px;font-size:9px;color:#2C2422}
</style>
</head>
<body>

<nav class="nav">
  <a href="/" class="nav-brand">
    <svg width="22" height="22" viewBox="0 0 60 60" fill="none" style="animation:spin 14s linear infinite;flex-shrink:0"><circle cx="30" cy="30" r="26" stroke="rgba(196,113,74,.35)" stroke-width="2.5" fill="none"/><path d="M30 30 L30 50" stroke="rgba(196,113,74,.25)" stroke-width="2" stroke-linecap="round" stroke-dasharray="2 4"/><path d="M30 30 L30 10" stroke="rgba(196,113,74,.8)" stroke-width="4" stroke-linecap="round"/><path d="M23 16 L30 8 L37 16" fill="#C4714A"/><circle cx="30" cy="30" r="4" fill="#C4714A"/><circle cx="30" cy="30" r="1.8" fill="#1E1613"/></svg>
    <div class="nav-brand-text">
      <span class="nav-brand-top">find my</span>
      <span class="nav-brand-name">Journey</span>
    </div>
  </a>
  <span class="nav-right">CV Builder</span>
</nav>

<div class="app">
  <div class="form-panel">
    <div class="form-inner" id="formInner"></div>
  </div>
  <div class="preview-panel">
    <div class="preview-title">Live preview</div>
    <div class="preview-doc" id="previewDoc">
      <div class="preview-placeholder">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="opacity:.3"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        <p>Your CV preview appears here as you fill in your details</p>
      </div>
    </div>
    <div style="margin-top:12px;font-size:11px;color:var(--muted);text-align:center">Updates as you type</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Constants ──
var MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
var SOFT_SKILLS = ['Communication','Teamwork','Problem solving','Adaptability','Leadership','Time management','Attention to detail','Customer service','Initiative','Critical thinking','Empathy','Creativity','Reliability','Work ethic','Conflict resolution'];
var SUBJECTS = ['English','Mathematics','Science','Biology','Chemistry','Physics','History','Geography','Art','Music','Physical Education','Technology','Computing','Economics','Business','Health','Legal Studies','Psychology','Languages','Drama'];
var PROFICIENCY = ['Bilingual','Fluent','Conversational','Basic'];
var YEAR_LEVELS = ['7','8','9','10','11','12'];
var YEARS = [];
(function(){ var y = new Date().getFullYear(); for(var i=y;i>=y-10;i--) YEARS.push(String(i)); })();

// ── State ──
var CV = {};
var PATH = null;
var STEP = 0;
var ASSESSMENT_DATA = null;
var CV_UUID = null;
var JD_OPEN = false;
var EXPERIENCE_BLOCKS = [];
var EDUCATION_BLOCKS = [];
var REFEREE_BLOCKS = [];
var SPORT_BLOCKS = [];
var VOLUNTEER_BLOCKS = [];
var LANGUAGE_BLOCKS = [];
var CERT_BLOCKS = [];

// ── URL params ──
var urlParams = new URLSearchParams(window.location.search);
var fromAssessment = urlParams.get('from') === 'assessment';
var assessmentUUID = urlParams.get('uuid');
var cvUUID = urlParams.get('cv');

window.addEventListener('DOMContentLoaded', function() {
  if (cvUUID) { loadSavedCV(cvUUID); }
  else if (fromAssessment && assessmentUUID) { loadAssessmentData(assessmentUUID); }
  else { showPathSelector(); }
});

// ── Utility: escape HTML ──
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Utility: show loading ──
function showLoading(msg) {
  var fi = document.getElementById('formInner');
  if (!fi) return;
  fi.innerHTML = '';
  var wrap = document.createElement('div');
  wrap.className = 'loading-screen';
  var spin = document.createElement('div');
  spin.className = 'spinner';
  var txt = document.createElement('div');
  txt.className = 'loading-msg';
  txt.textContent = msg || 'Loading\u2026';
  wrap.appendChild(spin);
  wrap.appendChild(txt);
  fi.appendChild(wrap);
}

// ── Utility: toast ──
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2500);
}

// ── Utility: build select ──
function buildSelect(id, options, selected, onchangeFn, placeholder) {
  var sel = document.createElement('select');
  if (id) sel.id = id;
  if (onchangeFn) sel.addEventListener('change', onchangeFn);
  if (placeholder) {
    var opt0 = document.createElement('option');
    opt0.value = '';
    opt0.textContent = placeholder;
    sel.appendChild(opt0);
  }
  options.forEach(function(o) {
    var opt = document.createElement('option');
    var val = typeof o === 'object' ? o.value : o;
    var lbl = typeof o === 'object' ? o.label : o;
    opt.value = val;
    opt.textContent = lbl;
    if (val === selected) opt.selected = true;
    sel.appendChild(opt);
  });
  return sel;
}

// ── Utility: build field ──
function buildField(id, labelHTML, type, placeholder, onInput) {
  var wrap = document.createElement('div');
  wrap.className = 'field';
  var lbl = document.createElement('label');
  if (id) lbl.setAttribute('for', 'f_' + id);
  lbl.innerHTML = labelHTML;
  wrap.appendChild(lbl);
  var input;
  if (type === 'textarea') {
    input = document.createElement('textarea');
    input.placeholder = placeholder || '';
  } else {
    input = document.createElement('input');
    input.type = type || 'text';
    input.placeholder = placeholder || '';
  }
  if (id) {
    input.id = 'f_' + id;
    input.value = CV[id] || '';
  }
  input.addEventListener('input', function() {
    if (id) CV[id] = this.value;
    if (onInput) onInput(this.value);
    updatePreview();
  });
  wrap.appendChild(input);
  return wrap;
}

// ── Utility: build date picker row ──
function buildDatePicker(stateKey, blockArr, blockIdx, dateKey, label, allowCurrent, onChangeFn) {
  var wrap = document.createElement('div');
  wrap.className = 'field';
  var lbl = document.createElement('label');
  lbl.textContent = label + (allowCurrent ? '' : '');
  wrap.appendChild(lbl);

  var row = document.createElement('div');
  row.className = 'date-picker-row';

  // Get current value — read directly from source of truth
  var currentVal = blockArr ? blockArr[blockIdx][dateKey] : (CV[stateKey] || '');
  var isCurrent = currentVal === 'Current';
  var parts = (!isCurrent && currentVal) ? currentVal.split(' ') : [];
  var curMonth = parts[0] || '';
  var curYear = parts[1] || '';

  // Build month select — pre-select if value exists
  var monthOpts = MONTHS.map(function(m){ return {value:m, label:m}; });
  var monthSel = buildSelect(null, monthOpts, curMonth, null, 'Month');

  // Build year select — pre-select if value exists
  var yearOpts = YEARS.map(function(y){ return {value:y, label:y}; });
  var yearSel = buildSelect(null, yearOpts, curYear, null, 'Year');

  if (isCurrent) {
    monthSel.disabled = true;
    yearSel.disabled = true;
  }

  function updateVal() {
    if (isCurrent) { updatePreview(); return; }
    var m = monthSel.value;
    var y = yearSel.value;
    var val = (m && y) ? (m + ' ' + y) : '';
    if (blockArr) { blockArr[blockIdx][dateKey] = val; }
    else { CV[stateKey] = val; }
    if (onChangeFn) onChangeFn();
    updatePreview();
  }

  // Save partial values immediately on each select change
  monthSel.addEventListener('change', function() {
    if (!isCurrent) {
      var m = monthSel.value;
      var y = yearSel.value;
      var val = m ? (y ? m + ' ' + y : m + ' ?') : '';
      if (m && y) val = m + ' ' + y; else val = '';
      if (blockArr) { blockArr[blockIdx][dateKey] = val; }
      else { CV[stateKey] = val; }
    }
    updateVal();
  });
  yearSel.addEventListener('change', function() {
    if (!isCurrent) {
      var m = monthSel.value;
      var y = yearSel.value;
      var val = (m && y) ? m + ' ' + y : '';
      if (blockArr) { blockArr[blockIdx][dateKey] = val; }
      else { CV[stateKey] = val; }
    }
    updateVal();
  });

  row.appendChild(monthSel);
  row.appendChild(yearSel);

  if (allowCurrent) {
    var curLbl = document.createElement('label');
    curLbl.className = 'cur-label';
    var curChk = document.createElement('input');
    curChk.type = 'checkbox';
    curChk.checked = isCurrent;
    curChk.addEventListener('change', function() {
      isCurrent = this.checked;
      if (isCurrent) {
        monthSel.disabled = true;
        yearSel.disabled = true;
        if (blockArr) { blockArr[blockIdx][dateKey] = 'Current'; }
        else { CV[stateKey] = 'Current'; }
      } else {
        monthSel.disabled = false;
        yearSel.disabled = false;
        if (blockArr) { blockArr[blockIdx][dateKey] = ''; }
        else { CV[stateKey] = ''; }
      }
      if (onChangeFn) onChangeFn();
      updatePreview();
    });
    curLbl.appendChild(curChk);
    curLbl.appendChild(document.createTextNode(' Current'));
    row.appendChild(curLbl);
  }

  wrap.appendChild(row);
  return wrap;
}

// ── Load assessment data ──
async function loadAssessmentData(uuid) {
  showLoading('Loading your assessment results\u2026');
  try {
    var r = await fetch('/api/get-result?uuid=' + uuid);
    if (r.ok) {
      var data = await r.json();
      if (data && data.result) {
        ASSESSMENT_DATA = data.result;
        CV.first_name = data.result.name || '';
        CV.email = data.result.email || '';
        CV.profile_draft = data.result.summary || '';
      }
    }
  } catch(e) {}
  showPathSelector();
}

// ── Load saved CV ──
async function loadSavedCV(uuid) {
  showLoading('Loading your saved CV\u2026');
  try {
    var r = await fetch('/api/cv-get?uuid=' + uuid);
    if (r.ok) {
      var data = await r.json();
      if (data && data.cv) {
        CV = data.cv;
        PATH = data.cv.path;
        EXPERIENCE_BLOCKS = data.cv.experience || [];
        EDUCATION_BLOCKS = data.cv.education || [];
        REFEREE_BLOCKS = data.cv.referees || [];
        SPORT_BLOCKS = data.cv.sport_blocks || [];
        VOLUNTEER_BLOCKS = data.cv.volunteer_blocks || [];
        LANGUAGE_BLOCKS = data.cv.language_blocks || [];
        CV_UUID = uuid;
        showStep(0);
        updatePreview();
        return;
      }
    }
    showToast('Could not load CV. Starting fresh.');
    showPathSelector();
  } catch(e) { showPathSelector(); }
}

// ── Steps definition ──
function getSteps() {
  var s = [
    {id:'personal', label:'Personal details', tag:'About you'},
    {id:'education', label:'Education', tag:'Your background'},
    {id:'experience', label:'Experience', tag:'What you\'ve done'}
  ];
  if (PATH === 'school' || PATH === 'leaver') {
    s.push({id:'life', label:'Life & activities', tag:'Beyond the classroom'});
  }
  s.push({id:'skills', label:'Skills & strengths', tag:'What you bring'});
  s.push({id:'profile', label:'Professional profile', tag:'Your story'});
  if (PATH === 'experience' || PATH === 'graduate') {
    s.push({id:'extras', label:'Achievements & activities', tag:'Going further'});
  }
  s.push({id:'jd', label:'Tailor & generate', tag:'Final step'});
  return s;
}

function startBuild() { if (PATH) showStep(0); }

// ── Show step ──
function showStep(i) {
  var steps = getSteps();
  if (i < 0) { showPathSelector(); return; }
  if (i >= steps.length) { generateCV(); return; }
  STEP = i;
  var step = steps[i];

  var fi = document.getElementById('formInner');
  fi.innerHTML = '';

  // Progress
  var progWrap = document.createElement('div');
  progWrap.className = 'progress-wrap';
  var progSteps = document.createElement('div');
  progSteps.className = 'progress-steps';
  steps.forEach(function(s, idx) {
    var ps = document.createElement('div');
    ps.className = 'progress-step' + (idx < i ? ' done' : idx === i ? ' active' : '');
    progSteps.appendChild(ps);
  });
  var progLabel = document.createElement('div');
  progLabel.className = 'progress-label';
  progLabel.textContent = 'Step ' + (i+1) + ' of ' + steps.length + ' \u2014 ' + step.label;
  progWrap.appendChild(progSteps);
  progWrap.appendChild(progLabel);
  fi.appendChild(progWrap);

  // Heading
  var head = document.createElement('div');
  head.className = 'section-head';
  head.innerHTML = '<div class="section-tag">' + step.tag + '</div><div class="section-title">' + step.label + '</div>';
  fi.appendChild(head);

  // Error box
  var errBox = document.createElement('div');
  errBox.className = 'error-box';
  errBox.id = 'errBox';
  fi.appendChild(errBox);

  // Step content
  buildStepContent(step.id, fi);

  // Buttons
  var btnRow = document.createElement('div');
  btnRow.className = 'btn-row';
  if (i > 0) {
    var backBtn = document.createElement('button');
    backBtn.className = 'btn-sec';
    backBtn.textContent = 'Back';
    (function(idx){ backBtn.addEventListener('click', function(){ showStep(idx - 1); }); })(i);
    btnRow.appendChild(backBtn);
  }
  var nextBtn = document.createElement('button');
  nextBtn.className = 'btn-primary';
  var isLast = (i === steps.length - 1);
  nextBtn.textContent = isLast ? '\u2728 Build my CV' : 'Continue \u2192';
  (function(idx, last){
    nextBtn.addEventListener('click', function(){
      if (last) { generateCV(); }
      else { nextStep(idx); }
    });
  })(i, isLast);
  btnRow.appendChild(nextBtn);
  fi.appendChild(btnRow);

  updatePreview();
  fi.scrollTop = 0;
}

// ── Pill toggle ──
function togglePill(el, key, val) {
  if (!CV[key]) CV[key] = [];
  var max = key === 'soft_skills' ? 6 : 999;
  if (el.classList.contains('selected')) {
    el.classList.remove('selected');
    CV[key] = CV[key].filter(function(v){ return v !== val; });
  } else {
    if (CV[key].length >= max) { showToast('Maximum ' + max + ' selections'); return; }
    el.classList.add('selected');
    CV[key].push(val);
  }
  updatePreview();
}

// ── Custom subject ──
function addCustomSubject() {
  var input = document.getElementById('customSubjectInput');
  if (!input || !input.value.trim()) return;
  var val = input.value.trim();
  if (!CV.subjects) CV.subjects = [];
  if (CV.subjects.indexOf(val) > -1) { showToast('Already added'); return; }
  CV.subjects.push(val);
  var group = document.getElementById('subjectPills');
  if (group) {
    var pill = document.createElement('div');
    pill.className = 'pill selected';
    pill.textContent = val;
    pill.addEventListener('click', function(){ togglePill(pill, 'subjects', val); });
    group.appendChild(pill);
  }
  input.value = '';
}

// ── JD toggle ──
function toggleJD() {
  JD_OPEN = !JD_OPEN;
  var t = document.getElementById('jdToggle');
  var c = document.getElementById('jdContent');
  if (t) t.classList.toggle('open', JD_OPEN);
  if (c) c.classList.toggle('open', JD_OPEN);
}

// ── Experience blocks ──
function addExperience() {
  EXPERIENCE_BLOCKS.push({employer:'', role:'', start:'', end:'', duties:''});
  CV.experience = EXPERIENCE_BLOCKS;
  renderExperienceBlocks();
}
function removeExperience(i) {
  EXPERIENCE_BLOCKS.splice(i, 1);
  CV.experience = EXPERIENCE_BLOCKS;
  renderExperienceBlocks();
  updatePreview();
}
function sortExperienceSilent() {
  // Get current order before sort
  var before = EXPERIENCE_BLOCKS.map(function(b){ return b.employer + b.role + b.start; }).join('|');
  EXPERIENCE_BLOCKS.sort(function(a, b) {
    var ae = a.end === 'Current' ? '9999-99' : dateToSort(a.end);
    var be = b.end === 'Current' ? '9999-99' : dateToSort(b.end);
    return be.localeCompare(ae);
  });
  CV.experience = EXPERIENCE_BLOCKS;
  // Only re-render if order changed — keeps date pickers intact when order unchanged
  var after = EXPERIENCE_BLOCKS.map(function(b){ return b.employer + b.role + b.start; }).join('|');
  if (before !== after) {
    renderExperienceBlocks();
  }
}
function sortExperience() {
  EXPERIENCE_BLOCKS.sort(function(a, b) {
    var ae = a.end === 'Current' ? '9999-99' : dateToSort(a.end);
    var be = b.end === 'Current' ? '9999-99' : dateToSort(b.end);
    return be.localeCompare(ae);
  });
  CV.experience = EXPERIENCE_BLOCKS;
  renderExperienceBlocks();
}
function dateToSort(d) {
  if (!d) return '0000-00';
  var parts = d.split(' ');
  if (parts.length !== 2) return '0000-00';
  var mi = MONTHS.indexOf(parts[0]);
  return parts[1] + '-' + (mi >= 0 ? String(mi+1).padStart(2,'0') : '00');
}
function renderExperienceBlocks() {
  var wrap = document.getElementById('experienceBlocks');
  if (!wrap) return;
  wrap.innerHTML = '';
  EXPERIENCE_BLOCKS.forEach(function(b, i) {
    var block = document.createElement('div'); block.className = 'repeat-block';
    var blockHead = document.createElement('div'); blockHead.className = 'repeat-block-head';

// ── Validation ──
function nextStep(i) {
  var steps = getSteps();
  var err = validateStep(steps[i].id);
  if (err) {
    var eb = document.getElementById('errBox');
    if (eb) { eb.textContent = err; eb.style.display = 'block'; }
    return;
  }
  showStep(i + 1);
}
function validateStep(id) {
  if (id === 'personal') {
    if (!CV.first_name) return 'Please enter your first name.';
    if (!CV.last_name) return 'Please enter your last name.';
    if (!CV.email) return 'Please enter your email address.';
    if (!CV.phone) return 'Please enter your phone number.';
    if (!CV.suburb) return 'Please enter your suburb.';
    if (!CV.state) return 'Please enter your state.';
  }
  if (id === 'education' && PATH === 'school') {
    if (!CV.school_name) return 'Please enter your school name.';
  }
  if (id === 'experience') {
    for (var i = 0; i < EXPERIENCE_BLOCKS.length; i++) {
      var b = EXPERIENCE_BLOCKS[i];
      if (b.employer || b.role) {
        if (!b.start) return 'Please enter a start date for Role ' + (i+1) + '.';
        if (!b.end) return 'Please enter an end date for Role ' + (i+1) + ', or select Current.';
      }
    }
  }
  return null;
}

// ── Generate CV ──
async function generateCV() {
  var jdEl = document.getElementById('f_jd'); if (jdEl) CV.jd = jdEl.value;
  var certsEl = document.getElementById('f_certs'); if (certsEl) CV.certs = certsEl.value;
  CV.experience = EXPERIENCE_BLOCKS;
  CV.education = EDUCATION_BLOCKS;
  CV.referees = REFEREE_BLOCKS;
  CV.sport_blocks = SPORT_BLOCKS;
  CV.volunteer_blocks = VOLUNTEER_BLOCKS;
  CV.language_blocks = LANGUAGE_BLOCKS;
  CV.cert_blocks = CERT_BLOCKS;
  var hasJD = CV.jd && CV.jd.trim().length > 20;
  showLoading(hasJD ? 'Building your CV and cover letter\u2026' : 'Building your CV\u2026');
  try {
    var r = await fetch('/api/cv-generate', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({cv: CV, path: PATH, assessment: ASSESSMENT_DATA, hasJD: hasJD})
    });
    var data = await r.json();
    if (!r.ok || data.error) {
      showStep(getSteps().length - 1);
      var eb = document.getElementById('errBox');
      if (eb) { eb.textContent = data.error || 'Something went wrong. Please try again.'; eb.style.display = 'block'; }
      return;
    }
    CV_UUID = data.uuid;
    showResultScreen(data);
  } catch(e) {
    showStep(getSteps().length - 1);
    var eb2 = document.getElementById('errBox');
    if (eb2) { eb2.textContent = 'Connection error. Please check your internet and try again.'; eb2.style.display = 'block'; }
  }
}

// ── Result screen ──
function showResultScreen(data) {
  var hasJD = CV.jd && CV.jd.trim().length > 20;
  var fi = document.getElementById('formInner');
  fi.innerHTML = '';

  var tag = document.createElement('div'); tag.className = 'section-tag'; tag.textContent = '\u2728 All done';
  fi.appendChild(tag);
  var title = document.createElement('div'); title.style.cssText = 'font-family:var(--font-display);font-size:26px;font-weight:300;color:var(--text);margin-bottom:6px';
  title.textContent = 'Your CV is ready' + (CV.first_name ? ', ' + CV.first_name : '') + '.';
  fi.appendChild(title);
  var sub = document.createElement('div'); sub.style.cssText = 'font-size:13px;color:var(--muted);margin-bottom:24px;line-height:1.5';
  sub.textContent = 'Download below. Come back any time with your personal link to edit and update.';
  fi.appendChild(sub);

  function makeAction(icon, title2, sub2, href, clickFn) {
    var a = href ? document.createElement('a') : document.createElement('div');
    a.className = 'result-action';
    if (href) { a.href = href; a.target = '_blank'; }
    if (clickFn) { a.style.cursor = 'pointer'; a.addEventListener('click', clickFn); }
    a.innerHTML = '<div class="result-action-icon">' + icon + '</div><div class="result-action-text"><div class="result-action-title">' + title2 + '</div><div class="result-action-sub">' + sub2 + '</div></div>';
    return a;
  }

  fi.appendChild(makeAction('\uD83D\uDCC4', 'Download as PDF', 'Best for emailing and applying online', '/api/cv-download?uuid=' + CV_UUID + '&format=pdf'));
  fi.appendChild(makeAction('\uD83D\uDCDD', 'Download as Word', 'Editable in Microsoft Word or Google Docs', '/api/cv-download?uuid=' + CV_UUID + '&format=docx'));
  if (hasJD) {
    fi.appendChild(makeAction('\u2709\uFE0F', 'Download cover letter', 'Tailored to the job you applied for', '/api/cv-download?uuid=' + CV_UUID + '&format=cover'));
  }
  fi.appendChild(makeAction('\u270F\uFE0F', 'Edit my CV', 'Go back and make changes', null, function(){ showStep(0); }));

  // Save link
  var saveLink = window.location.origin + '/cv-builder.html?cv=' + CV_UUID;
  var slWrap = document.createElement('div'); slWrap.className = 'save-link-wrap';
  var slLbl = document.createElement('div'); slLbl.className = 'save-link-label'; slLbl.textContent = 'Your personal CV link \u2014 bookmark this to come back and edit';
  var slRow = document.createElement('div'); slRow.className = 'save-link-row';
  var slInput = document.createElement('input'); slInput.className = 'save-link-input'; slInput.id = 'cvSaveLink'; slInput.value = saveLink; slInput.readOnly = true;
  var slBtn = document.createElement('button'); slBtn.className = 'save-link-btn'; slBtn.id = 'cvCopyBtn'; slBtn.textContent = 'Copy link';
  slBtn.addEventListener('click', function() {
    navigator.clipboard.writeText(saveLink).then(function() {
      slBtn.textContent = 'Copied!';
      setTimeout(function(){ slBtn.textContent = 'Copy link'; }, 2000);
    });
  });
  slRow.appendChild(slInput); slRow.appendChild(slBtn);
  slWrap.appendChild(slLbl); slWrap.appendChild(slRow);
  fi.appendChild(slWrap);

  var disclaimer = document.createElement('div'); disclaimer.className = 'disclaimer';
  disclaimer.textContent = '\u26A0\uFE0F This CV was generated with AI assistance. Please review all content carefully before sending. Find My Journey does not fabricate experience, qualifications or skills \u2014 all content is based on what you provided.';
  fi.appendChild(disclaimer);

  if (data.cv_html) document.getElementById('previewDoc').innerHTML = data.cv_html;
}

// ── Live preview ──
function updatePreview() {
  var doc = document.getElementById('previewDoc'); if (!doc) return;
  var name = (CV.first_name || '') + (CV.last_name ? ' ' + CV.last_name : '');
  if (!name.trim()) return;
  var h = '';
  h += '<div class="cv-name">' + esc(name) + '</div>';
  var contact = [];
  if (CV.phone) contact.push(esc(CV.phone));
  if (CV.email) contact.push(esc(CV.email));
  if (CV.suburb && CV.state) contact.push(esc(CV.suburb + ', ' + CV.state));
  if (CV.linkedin) contact.push(esc(CV.linkedin));
  h += '<div class="cv-contact-row">' + contact.join(' &nbsp;|&nbsp; ') + '</div>';
  var profile = CV.profile || CV.profile_draft || (ASSESSMENT_DATA && ASSESSMENT_DATA.summary);
  if (profile) { h += '<div class="cv-section-title">Professional Profile</div><div class="cv-profile">' + esc(profile) + '</div>'; }
  var hasEdu = CV.school_name || (EDUCATION_BLOCKS && EDUCATION_BLOCKS.length > 0);
  if (hasEdu) {
    h += '<div class="cv-section-title">Education</div>';
    if (CV.school_name) { h += '<div class="cv-item"><div class="cv-item-head"><span class="cv-item-title">' + esc(CV.school_name) + '</span><span class="cv-item-date">' + esc(CV.school_year || '') + '</span></div></div>'; }
    EDUCATION_BLOCKS.forEach(function(b) {
      if (!b.institution) return;
      h += '<div class="cv-item"><div class="cv-item-head"><span class="cv-item-title">' + esc(b.qualification||'') + '</span><span class="cv-item-date">' + esc(b.year||'') + '</span></div><div class="cv-item-org">' + esc(b.institution) + (b.major ? ' \u2014 ' + esc(b.major) : '') + '</div></div>';
    });
  }
  if (EXPERIENCE_BLOCKS && EXPERIENCE_BLOCKS.length > 0) {
    h += '<div class="cv-section-title">Experience</div>';
    EXPERIENCE_BLOCKS.forEach(function(b) {
      if (!b.employer && !b.role) return;
      h += '<div class="cv-item"><div class="cv-item-head"><span class="cv-item-title">' + esc(b.role||'') + '</span><span class="cv-item-date">' + esc((b.start||'') + (b.end ? ' \u2013 ' + b.end : '')) + '</span></div><div class="cv-item-org">' + esc(b.employer||'') + '</div>';
      if (b.duties) h += '<div class="cv-item-body">' + esc(b.duties) + '</div>';
      h += '</div>';
    });
  }
  var allSkills = (CV.soft_skills || []).concat((CV.hard_skills || '').split(',').map(function(s){ return s.trim(); }).filter(Boolean));
  if (allSkills.length > 0) {
    h += '<div class="cv-section-title">Skills</div><div class="cv-skills-wrap">';
    allSkills.slice(0,12).forEach(function(s){ h += '<span class="cv-skill">' + esc(s) + '</span>'; });
    h += '</div>';
  }
  doc.innerHTML = h;
}
</script>
</body>
</html>
