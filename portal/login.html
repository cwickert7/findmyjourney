<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Find My Journey — Institution Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,200;9..144,300;9..144,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#FAF7F2;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{background:#fff;border:1px solid #E8DFD0;border-radius:20px;padding:44px;width:100%;max-width:420px;box-shadow:0 4px 32px rgba(44,36,34,.06)}
.brand{display:flex;align-items:center;gap:10px;margin-bottom:32px;justify-content:center}
.brand-text{display:flex;flex-direction:column;align-items:flex-start;line-height:1}
.brand-top{font-family:'DM Sans',sans-serif;font-size:9px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:rgba(196,113,74,.7);margin-bottom:2px}
.brand-name{font-family:'Fraunces',serif;font-size:20px;font-weight:300;color:#2C2422;letter-spacing:-.01em}
.portal-badge{background:#FEF3EC;border:1px solid rgba(196,113,74,.25);border-radius:20px;padding:4px 14px;font-size:11px;font-weight:600;color:#C4714A;letter-spacing:.06em;text-align:center;margin-bottom:28px}
h1{font-family:'Fraunces',serif;font-size:28px;font-weight:300;color:#2C2422;margin-bottom:6px;text-align:center}
.sub{font-size:13px;color:#9A8E84;text-align:center;margin-bottom:28px;line-height:1.5}
.field{margin-bottom:16px}
.field label{display:block;font-size:12px;font-weight:500;color:#6B6058;margin-bottom:6px}
.field input{width:100%;border:1px solid #E8DFD0;border-radius:10px;padding:12px 14px;font-size:14px;color:#2C2422;font-family:'DM Sans',sans-serif;background:#FAF7F2;outline:none;transition:border-color .15s}
.field input:focus{border-color:#C4714A;background:#fff}
.field input::placeholder{color:#C8BFB5}
.btn{width:100%;background:#C4714A;color:#fff;border:none;border-radius:50px;padding:13px;font-size:15px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;margin-top:8px;transition:background .15s}
.btn:hover{background:#A85C38}
.btn:disabled{background:rgba(196,113,74,.4);cursor:not-allowed}
.error{background:#FCEBEB;border:1px solid #F09595;border-radius:8px;padding:10px 14px;font-size:13px;color:#A32D2D;margin-bottom:16px;display:none}
.footer-note{text-align:center;font-size:12px;color:#C8BFB5;margin-top:20px;line-height:1.6}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="card">
  <div class="brand">
    <svg width="28" height="28" viewBox="0 0 60 60" fill="none" style="animation:spin 14s linear infinite;flex-shrink:0"><circle cx="30" cy="30" r="26" stroke="rgba(196,113,74,.35)" stroke-width="2" fill="none"/><path d="M30 30 L30 50" stroke="rgba(196,113,74,.3)" stroke-width="2" stroke-linecap="round" stroke-dasharray="2 4"/><path d="M30 30 L30 10" stroke="rgba(196,113,74,.85)" stroke-width="4" stroke-linecap="round"/><path d="M23 16 L30 8 L37 16" fill="#C4714A"/><circle cx="30" cy="30" r="4.5" fill="#C4714A"/><circle cx="30" cy="30" r="2" fill="#2C2422"/></svg>
    <div class="brand-text">
      <span class="brand-top">find my</span>
      <span class="brand-name">Journey</span>
    </div>
  </div>
  <div class="portal-badge">Institution Portal</div>
  <h1>Welcome back</h1>
  <p class="sub">Sign in to manage your students<br>and view their results.</p>

  <div class="error" id="errorMsg"></div>

  <div class="field">
    <label>Email address</label>
    <input type="email" id="email" placeholder="your@school.edu.au" autocomplete="email">
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••••" autocomplete="current-password">
  </div>
  <button class="btn" id="signInBtn" onclick="signIn()">Sign in</button>
  <p class="footer-note">Forgotten your password?<br>Contact your institution administrator or email<br>hello@findmyjourney.com.au</p>
</div>

<script>
function g(id){return document.getElementById(id);}

async function signIn(){
  var email=g('email').value.trim();
  var password=g('password').value;
  var btn=g('signInBtn');
  var err=g('errorMsg');
  err.style.display='none';

  if(!email||!password){showErr('Please enter your email and password.');return;}
  btn.disabled=true;btn.textContent='Signing in\u2026';

  try{
    var r=await fetch('/api/portal/auth',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email,password})
    });
    var data=await r.json();
    if(!r.ok||!data.ok){
      showErr(data.error||'Sign in failed. Please check your credentials.');
      btn.disabled=false;btn.textContent='Sign in';
      return;
    }
    localStorage.setItem('fmj_portal_session',JSON.stringify(data.session));
    localStorage.setItem('fmj_portal_user',JSON.stringify(data.user));
    window.location.href='/portal/dashboard.html';
  }catch(e){
    showErr('Connection error. Please try again.');
    btn.disabled=false;btn.textContent='Sign in';
  }
}

function showErr(msg){var e=g('errorMsg');e.textContent=msg;e.style.display='block';}
document.addEventListener('keydown',function(e){if(e.key==='Enter')signIn();});

// Redirect if already logged in
var sess=localStorage.getItem('fmj_portal_session');
if(sess){try{var s=JSON.parse(sess);if(s&&s.access_token){window.location.href='/portal/dashboard.html';}}catch(e){}}
</script>
</body>
</html>
