<!DOCTYPE html>
<!-- FILE: portal/reset-password.html -->
<!-- Password reset/set page for institution portal users arriving via Supabase recovery link -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Find My Journey — Set your password</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#FAF7F2;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{background:#fff;border:1px solid #E8DFD0;border-radius:20px;padding:44px;width:100%;max-width:420px;box-shadow:0 4px 32px rgba(44,36,34,.06)}
.brand{display:flex;align-items:center;gap:10px;margin-bottom:72px;justify-content:center}
.brand-text{display:flex;flex-direction:column;align-items:flex-start;line-height:1}
.brand-top{font-family:'DM Sans',sans-serif;font-size:9px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:rgba(196,113,74,.7);margin-bottom:2px}
.brand-name{font-family:'Fraunces',serif;font-size:20px;font-weight:300;color:#2C2422;letter-spacing:-.01em}
.portal-badge{background:#FEF3EC;border:1px solid rgba(196,113,74,.25);border-radius:20px;padding:4px 14px;font-size:11px;font-weight:600;color:#C4714A;letter-spacing:.06em;text-align:center;margin-bottom:72px}
h1{font-family:'Fraunces',serif;font-size:28px;font-weight:300;color:#2C2422;margin-bottom:6px;text-align:center}
.sub{font-size:13px;color:#9A8E84;text-align:center;margin-bottom:28px;line-height:1.5}
.field{margin-bottom:16px}
.field label{display:block;font-size:12px;font-weight:500;color:#6B6058;margin-bottom:6px}
.field input{width:100%;border:1px solid #E8DFD0;border-radius:10px;padding:12px 14px;font-size:14px;color:#2C2422;font-family:'DM Sans',sans-serif;background:#FAF7F2;outline:none;transition:border-color .15s}
.field input:focus{border-color:#C4714A;background:#fff}
.btn{width:100%;background:#C4714A;color:#fff;border:none;border-radius:50px;padding:13px;font-size:15px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;margin-top:8px;transition:background .15s}
.btn:hover{background:#A85C38}
.btn:disabled{opacity:.6;cursor:not-allowed}
.error{background:#FCEBEB;border:1px solid #F09595;border-radius:8px;padding:10px 14px;font-size:13px;color:#A32D2D;margin-bottom:16px;display:none}
.success{background:#EDF7EE;border:1px solid #8EC99A;border-radius:8px;padding:10px 14px;font-size:13px;color:#2A6B35;margin-bottom:16px;display:none}
.footer-note{text-align:center;font-size:12px;color:#C8BFB5;margin-top:20px;line-height:1.6}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="card">
  <a href="/" style="text-decoration:none;display:flex;justify-content:center"><div class="brand" style="margin-bottom:0">
    <svg width="28" height="28" viewBox="0 0 60 60" fill="none" style="animation:spin 14s linear infinite;flex-shrink:0"><circle cx="30" cy="30" r="26" stroke="rgba(196,113,74,.35)" stroke-width="2" fill="none"/><path d="M30 30 L30 50" stroke="rgba(196,113,74,.3)" stroke-width="2" stroke-linecap="round" stroke-dasharray="2 4"/><path d="M30 30 L30 10" stroke="rgba(196,113,74,.85)" stroke-width="4" stroke-linecap="round"/><path d="M23 16 L30 8 L37 16" fill="#C4714A"/><circle cx="30" cy="30" r="4.5" fill="#C4714A"/><circle cx="30" cy="30" r="2" fill="#2C2422"/></svg>
    <div class="brand-text">
      <span class="brand-top">find my</span>
      <span class="brand-name">Journey</span>
    </div>
  </div></a>
  <div style="margin-bottom:32px"></div>
  <div class="portal-badge">Institution Portal</div>
  <h1>Set your password</h1>
  <p class="sub">Choose a password to secure your account.</p>
  <div class="error" id="errBox"></div>
  <div class="success" id="successBox"></div>
  <div class="field">
    <label>New password</label>
    <input type="password" id="password" placeholder="At least 8 characters" autocomplete="new-password">
  </div>
  <div class="field">
    <label>Confirm password</label>
    <input type="password" id="confirmPassword" placeholder="Repeat your password" autocomplete="new-password">
  </div>
  <button class="btn" id="setBtn" onclick="setPassword()">Set password &amp; sign in</button>
  <div class="footer-note">Find My Journey &nbsp;·&nbsp; Institution Portal</div>
</div>

<script>
var SUPABASE_URL = 'https://your-project.supabase.co'; // replaced by env at runtime via api
var accessToken = null;
var refreshToken = null;

// Extract tokens from URL hash (Supabase puts them there)
function getHashParams() {
  var hash = window.location.hash.substring(1);
  var params = {};
  hash.split('&').forEach(function(part) {
    var pair = part.split('=');
    params[decodeURIComponent(pair[0])] = decodeURIComponent(pair[1] || '');
  });
  return params;
}

var params = getHashParams();
accessToken = params['access_token'] || null;
refreshToken = params['refresh_token'] || null;
var tokenType = params['type'] || null;

// If no token in hash, check if it's a query param
if (!accessToken) {
  var urlParams = new URLSearchParams(window.location.search);
  accessToken = urlParams.get('access_token');
  tokenType = urlParams.get('type');
}

if (!accessToken || (tokenType !== 'recovery' && tokenType !== 'invite')) {
  document.getElementById('errBox').style.display = 'block';
  document.getElementById('errBox').textContent = 'Invalid or expired password reset link. Please contact your FMJ administrator.';
  document.getElementById('setBtn').disabled = true;
}

async function setPassword() {
  var pw = document.getElementById('password').value;
  var cpw = document.getElementById('confirmPassword').value;
  var err = document.getElementById('errBox');
  var suc = document.getElementById('successBox');
  var btn = document.getElementById('setBtn');

  err.style.display = 'none';
  suc.style.display = 'none';

  if (!pw || pw.length < 8) {
    err.textContent = 'Password must be at least 8 characters.';
    err.style.display = 'block';
    return;
  }
  if (pw !== cpw) {
    err.textContent = 'Passwords do not match.';
    err.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Setting password…';

  try {
    var r = await fetch('/api/portal/set-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ access_token: accessToken, password: pw })
    });
    var data = await r.json();
    if (r.ok && data.ok) {
      suc.textContent = 'Password set successfully. Taking you to the portal…';
      suc.style.display = 'block';
      // Store session and redirect
      localStorage.setItem('fmj_portal_session', JSON.stringify(data.session));
      setTimeout(function() { window.location.href = '/portal/dashboard.html'; }, 1500);
    } else {
      err.textContent = data.error || 'Failed to set password. Please try again.';
      err.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Set password & sign in';
    }
  } catch(e) {
    err.textContent = 'Connection error. Please try again.';
    err.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Set password & sign in';
  }
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') setPassword();
});
</script>
</body>
</html>
